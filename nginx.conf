# Nginx Reverse Proxy Configuration for EduContest Platform
# Bu konfiguratsiya barcha platforma bo'limlari uchun reverse proxy sifatida ishlaydi

# HTTP dan HTTPS ga yo'naltirish (agar SSL ishlatilsa)
# server {
#     listen 80;
#     server_name educontest.uz www.educontest.uz;
#     return 301 https://$server_name$request_uri;
# }

# API domain: browser requests must stop here first. This proxy forwards
# Supabase-compatible paths to the Supabase project from the backend layer.
server {
    listen 80;
    server_name api.educontest.uz;

    client_max_body_size 100M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    set $supabase_upstream https://rcxfryjvdkmtbqivbrjg.supabase.co;

    location /auth/v1/ {
        proxy_pass $supabase_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host rcxfryjvdkmtbqivbrjg.supabase.co;
        proxy_redirect https://rcxfryjvdkmtbqivbrjg.supabase.co/ https://api.educontest.uz/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /rest/v1/ {
        proxy_pass $supabase_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host rcxfryjvdkmtbqivbrjg.supabase.co;
        proxy_redirect https://rcxfryjvdkmtbqivbrjg.supabase.co/ https://api.educontest.uz/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /storage/v1/ {
        proxy_pass $supabase_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host rcxfryjvdkmtbqivbrjg.supabase.co;
        proxy_redirect https://rcxfryjvdkmtbqivbrjg.supabase.co/ https://api.educontest.uz/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /functions/v1/ {
        proxy_pass $supabase_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host rcxfryjvdkmtbqivbrjg.supabase.co;
        proxy_redirect https://rcxfryjvdkmtbqivbrjg.supabase.co/ https://api.educontest.uz/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /realtime/v1/ {
        proxy_pass $supabase_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host rcxfryjvdkmtbqivbrjg.supabase.co;
        proxy_redirect https://rcxfryjvdkmtbqivbrjg.supabase.co/ https://api.educontest.uz/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}

# Asosiy server bloki
server {
    listen 80;
    server_name educontest.uz www.educontest.uz localhost;

    # Maximal yuklash hajmi
    client_max_body_size 100M;

    # Xavfsizlik headerlari
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.payme.uz https://*.click.uz https://accounts.google.com https://static.cloudflareinsights.com https://mc.yandex.ru https://cdn.onesignal.com https://api.onesignal.com https://abt.s3.yandex.net https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https: https://mc.yandex.ru; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com data: https://cdn.jsdelivr.net; connect-src 'self' https://*.payme.uz https://*.click.uz https://api.telegram.org https://*.supabase.co https://api.educontest.uz https://cloudflareinsights.com wss: https://mc.yandex.ru https://uaas.yandex.ru https://cdn.jsdelivr.net https://unpkg.com https://webvisor.com https://onesignal.com https://cdn.onesignal.com https://api.onesignal.com https://www.googletagmanager.com; frame-src 'self' https://accounts.google.com https://mc.yandex.ru https://webvisor.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Asosiy platforma (Main Platform) - port 8080
    # Barcha umumiy so'rovlar asosiy platformaga yo'naltiriladi
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeout sozlamalari
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer sozlamalari
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Admin bo'limi - alohida route
    location /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # O'quvchi SAT bo'limi (Student SAT Section) - port 8081
    # Barcha /sat/ yoki /student/ bilan boshlanadigan so'rovlar
    location /sat {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # O'quvchi bo'limi (Student Section)
    location /student {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # O'qituvchi bo'limi (Teacher Section)
    location /teacher {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API so'rovlari uchun
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Statik fayllar uchun (keshlash)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|mp4|webm|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # WebSocket connections uchun
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

